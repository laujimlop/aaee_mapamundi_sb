services:
  # Servicio de la aplicación Spring Boot
  app:
    image: mapamundi-app
    container_name: mapamundi-isidoronm
    ports:
      - "8080:8080"
    depends_on:
      - db

  # Servicio de MySQL
  db:
    image: mysql:latest
    container_name: mysql_vdlp
    hostname: mysql.vdlp
    ports:
      - "3306:3306"
	env_file:
	  - .env
	environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: mapa_mundi
    volumes:
      - ./mysql/conf.d:/etc/mysql/conf.d
      - ./mysql/init:/docker-entrypoint-initdb.d # Los scripts que se dejen en ./mysql/init serán cargados automáticamente por el contenedor.
      - mysql_data:/var/lib/mysql
    restart: always

# Volúmenes persistentes
volumes:
  mysql_data: